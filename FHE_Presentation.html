<title>FHE — Stratégie Plateforme Énergétique 2026–2028</title>
<style>
  :root {
    --green:   #81BB28;
    --greenD:  #64A932;
    --greenL:  #D0DEBD;
    --greenXL: #EDF4DC;
    --teal:    #25998C;
    --tealD:   #107065;
    --tealL:   #81C9BD;
    --tealXL:  #E6F7F5;
    --dark:    #1A1A1A;
    --dark2:   #252525;
    --charcoal:#3D3D3D;
    --gray:    #78797D;
    --grayL:   #D2D3D5;
    --grayXL:  #F0F2F0;
    --white:   #FFFFFF;
    --amber:   #E8A020;
    --amberL:  #FBF0D8;
    --blue:    #2060C0;
    --blueL:   #E8F0FC;
    --purple:  #6040B8;
    --purpleL: #EDEBFA;
    --red:     #D14545;
    --redL:    #FBEAEA;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Segoe UI', Calibri, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }

  /* Navigation */
  .nav { display: flex; align-items: center; gap: 16px; margin-top: 10px; }
  .nav button { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
  .nav button:hover { background: rgba(255,255,255,0.22); }
  .nav button:disabled { opacity: 0.3; cursor: default; }
  .slide-counter { color: rgba(255,255,255,0.6); font-size: 13px; min-width: 70px; text-align: center; }

  /* Slide container */
  .slide-wrap { width: min(90vw, 160vh * 16/9); aspect-ratio: 16/9; position: relative; }
  .slide { position: absolute; inset: 0; border-radius: 8px; overflow: hidden; display: none; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .slide.active { display: flex; }

  /* Common header */
  .hdr { background: var(--green); padding: 8px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .hdr-title { color: #fff; font-size: clamp(9px, 1.4vw, 15px); font-weight: 700; }
  .hdr-logo { height: 36px; width: 36px; object-fit: contain; }

  /* Slide backgrounds */
  .bg-white  { background: var(--white); }
  .bg-light  { background: var(--grayXL); }
  .bg-dark   { background: var(--dark); }

  /* Slide body */
  .body { flex: 1; overflow: hidden; }

  /* Cards */
  .card { background: var(--white); border: 0.5px solid var(--grayL); border-radius: 8px; overflow: hidden; }
  .card-shadow { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  /* Dots */
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }

  /* Bottom bar */
  .bottom-bar { background: var(--tealXL); border-top: 0.5px solid var(--tealL); padding: 5px 20px; font-size: clamp(7px,0.9vw,10px); color: var(--tealD); font-style: italic; flex-shrink: 0; text-align: center; }

  /* Keyboard hint */
  .hint { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 8px; }
</style>
</head>

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function hdr(num, title) {
  return `<div class="hdr">
    <span class="hdr-title">${num ? num+' / '+title : title}</span>
    <img class="hdr-logo" src="${LOGO}" alt="FHE">
  </div>`;
}

function dot(color) {
  return `<span class="dot" style="background:${color};margin-top:3px"></span>`;
}

function card(content, style='') {
  return `<div class="card card-shadow" style="${style}">${content}</div>`;
}

function pill(label, bg, fg='#fff') {
  return `<span style="background:${bg};color:${fg};font-size:clamp(6px,0.8vw,8.5px);font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">${label}</span>`;
}

function secBand(label, color) {
  return `<div style="background:${color};color:#fff;font-size:clamp(7px,0.95vw,10px);font-weight:700;padding:4px 12px;border-radius:4px;text-align:center;margin-bottom:6px">${label}</div>`;
}

function rowItem(title, body, alt, accent) {
  return `<div style="background:${alt?'var(--grayXL)':'var(--white)'};border:0.5px solid var(--grayL);display:flex;margin-bottom:4px;border-radius:4px;overflow:hidden">
    <div style="width:5px;background:${accent};flex-shrink:0"></div>
    <div style="padding:5px 10px">
      <div style="font-size:clamp(7px,0.95vw,10px);font-weight:700;color:var(--charcoal)">${title}</div>
      <div style="font-size:clamp(6px,0.82vw,9px);color:var(--gray);margin-top:2px">${body}</div>
    </div>
  </div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
let current = 0;
const wrap = document.getElementById('wrap');

// Inject slides
slides.forEach((html, i) => {
  const div = document.createElement('div');
  div.style.cssText = 'position:absolute;inset:0;display:none';
  div.innerHTML = html;
  // Find the inner slide div and mark it
  const inner = div.querySelector('.slide');
  if(inner) inner.dataset.idx = i;
  wrap.appendChild(div);
});

function show(n) {
  current = Math.max(0, Math.min(slides.length - 1, n));
  wrap.querySelectorAll(':scope > div').forEach((div, i) => {
    div.style.display = i === current ? 'block' : 'none';
    const inner = div.querySelector('.slide');
    if(inner) inner.style.display = i === current ? 'flex' : 'none';
  });
  document.getElementById('counter').textContent = `${current + 1} / ${slides.length}`;
  document.getElementById('prev').disabled = current === 0;
  document.getElementById('next').disabled = current === slides.length - 1;
}

function go(dir) { show(current + dir); }

document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if(e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

show(0);
